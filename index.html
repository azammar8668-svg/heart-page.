<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>❤️ برای تو ❤️</title>
<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.heart{
    color:red;
    font-size:120px;
    animation:beat 1s infinite;
}
@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}
.message{
    position:absolute;
    top:65%;
    color:white;
    font-size:30px;
    font-family:sans-serif;
}
</style>
</head>
<body>
<div class="heart">❤️</div>
<div class="message">دوستت دارم ❤️</div>
</body>
</html>
